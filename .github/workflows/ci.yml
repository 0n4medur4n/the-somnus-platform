name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref so PRs don't queue.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.5.0"

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Format check (biome)
        run: pnpm run format:check

      - name: Lint (biome)
        run: pnpm run lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm run typecheck

      # Package tests (packages/*/src/**/*.test.ts) import their sibling
      # workspace packages (e.g. @somnus/api-contracts) through each
      # package.json's "main", which points at dist/, not src/ -- so
      # those packages must be built before vitest can resolve them.
      - name: Build shared packages
        run: pnpm --if-present -r --filter "./packages/*" run build

      - name: Test (vitest run)
        run: pnpm run test:run

      - name: Build (tsc)
        run: pnpm run build

      - name: Verify ADRs present
        run: |
          set -euo pipefail
          for f in 0001 0002 0003 0004 0005 0006 0007 0008 0009 0010 0011 0012; do
            test -f "docs/adr/${f}-"*.md || { echo "Missing ADR ${f}"; exit 1; }
          done
          echo "All 12 ADRs present."

  identity-service:
    name: Identity service (TiDB dev cluster)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # A dedicated, ref-independent group: this job hits a single shared
    # external TiDB Cloud dev cluster (no per-run namespace), so two PRs'
    # runs must queue rather than race -- resetTables() in the test
    # suite would otherwise let one run truncate another's in-flight data.
    # Distinct from the workflow-level concurrency group above, which
    # only cancels older runs on the SAME ref.
    concurrency:
      group: identity-service-tidb-dev
      cancel-in-progress: false
    env:
      DATABASE_URL: ${{ secrets.TIDB_DEV_DATABASE_URL }}
      DB_SSL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # identity-service depends on the built dist/ of these workspace
      # packages (each package.json's "main" points at dist/, not src/).
      - name: Build shared packages
        run: pnpm --if-present -r --filter "./packages/*" run build

      # schemas/openapi/identity-service.json is a generated artifact
      # (gitignored, build plan §3.4: generated from Zod, never
      # hand-written) that test/contract/openapi.contract.test.ts reads
      # from disk -- it must exist before the test step runs.
      - name: Generate OpenAPI document
        run: pnpm --filter @somnus/identity-service generate:openapi

      # Includes the immutable negative-authorization suite (build plan
      # §20 Checkpoint 6.3) and enforces coverage thresholds.
      - name: Test identity-service
        run: pnpm --filter @somnus/identity-service test:coverage
